name: Pathrift
options:
  bundleIdPrefix: com.pathrift.anonve
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

targets:
  Pathrift:
    type: application
    platform: iOS
    sources:
      - path: Pathrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pathrift.anonve.ios
        SWIFT_VERSION: 5.9
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "8"
        INFOPLIST_FILE: Pathrift/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: GameplayKit.framework
